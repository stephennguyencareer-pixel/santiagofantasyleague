<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCT Americas 2026 — Fantasy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1612; --bg2: #221e19; --surface: #2a2420; --surface2: #2f2924;
    --border: #3d3530; --border2: #524840; --text: #e8ddd0; --text2: #a8998a; --muted: #6e6055;
    --accent: #d4895a; --accent2: #7aadcc; --accent3: #8bb87a;
    --gold: #d4a82a; --silver: #8a9aaa; --bronze: #b07840;
    --shadow: rgba(0,0,0,0.3); --shadow2: rgba(0,0,0,0.5);
    --m-stephen: #7aadcc; --m-boy: #d4895a; --m-keith: #8bb87a; --m-owen: #b07acd; --m-derek: #d4a82a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; background-image: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(212,137,90,0.07) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 90%, rgba(122,173,204,0.05) 0%, transparent 60%); }

  #loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 20px; transition: opacity 0.5s ease; }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-ring { width: 48px; height: 48px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; }

  header { background: rgba(26,22,18,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 0 2rem; }
  .header-inner { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; gap: 1rem; }
  .logo { display: flex; align-items: baseline; gap: 10px; }
  .logo-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--text); }
  .logo-title span { color: var(--accent); }
  .logo-sub { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 1.5px; padding-bottom: 2px; }
  nav { display: flex; gap: 2px; }
  nav button { background: none; border: none; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; padding: 8px 16px; cursor: pointer; border-radius: 20px; transition: all 0.2s; }
  nav button:hover { background: var(--bg2); color: var(--text); }
  nav button.active { background: var(--text); color: var(--bg); }

  main { max-width: 1300px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

  .hero { margin-bottom: 2.5rem; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem; }
  .hero-left h2 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; line-height: 1.1; margin-bottom: 8px; }
  .hero-left h2 em { color: var(--accent); font-style: italic; }
  .hero-left p { color: var(--muted); font-size: 0.82rem; font-family: 'DM Mono', monospace; }
  .hero-right { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .pill { padding: 5px 14px; border-radius: 20px; font-size: 0.72rem; font-family: 'DM Mono', monospace; border: 1px solid var(--border2); color: var(--text2); background: var(--surface); }
  .pill.live { border-color: var(--accent3); color: var(--accent3); background: rgba(122,158,110,0.08); display: flex; align-items: center; gap: 6px; }
  .pill.live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); animation: blink 1.8s ease-in-out infinite; flex-shrink: 0; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ── WIDGETS ── */
  .widgets-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
  @media(max-width:800px) { .widgets-row { grid-template-columns: 1fr; } }
  .widget-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; box-shadow: 0 2px 12px var(--shadow); position: relative; overflow: hidden; }
  .widget-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .widget-card.star::before { background: linear-gradient(90deg, var(--gold), #e8b830); }
  .widget-card.loser::before { background: linear-gradient(90deg, var(--accent2), #84b8d4); }
  .widget-card.hot::before { background: linear-gradient(90deg, #c05840, #d4895a); }
  .widget-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .widget-main { font-family: 'Playfair Display', serif; font-size: 1.45rem; font-weight: 700; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .widget-sub { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .widget-stat { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; }
  .widget-stat.gold-text { color: var(--gold); }
  .widget-stat.blue-text { color: var(--accent2); }
  .widget-stat.red-text { color: #d0624c; }
  .widget-owner-tag { display: inline-block; font-size: 0.65rem; font-family: 'DM Mono', monospace; padding: 2px 9px; border-radius: 10px; margin-top: 4px; }

  /* ── LEADERBOARD ── */
  .lb-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  @media(max-width:900px) { .lb-layout { grid-template-columns: 1fr; } }
  .lb-table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 16px var(--shadow); }
  .card-label { padding: 16px 20px 12px; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 2px; color: var(--muted); border-bottom: 1px solid var(--border); }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table td { padding: 13px 20px; border-bottom: 1px solid var(--border); }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-table tr:hover td { background: var(--surface2); }
  .lb-rank { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); width: 28px; }
  .lb-rank.gold { color: var(--gold); } .lb-rank.silver { color: var(--silver); } .lb-rank.bronze { color: var(--bronze); }
  .lb-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
  .lb-players-preview { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .lb-pts { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent); text-align: right; font-weight: 700; }

  .podium-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 2px 16px var(--shadow); }
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; height: 180px; margin-bottom: 20px; }
  .podium-slot { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; }
  .podium-name { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 1px; color: var(--text2); margin-bottom: 6px; text-align: center; }
  .podium-pts { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
  .podium-bar { width: 100%; border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; }
  .podium-pos { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: rgba(255,255,255,0.85); }
  .pos-1 .podium-bar { background: linear-gradient(to top, rgba(212,168,42,0.6), rgba(212,168,42,0.15)); height: 120px; }
  .pos-2 .podium-bar { background: linear-gradient(to top, rgba(138,154,170,0.55), rgba(138,154,170,0.12)); height: 90px; }
  .pos-3 .podium-bar { background: linear-gradient(to top, rgba(176,120,64,0.55), rgba(176,120,64,0.12)); height: 70px; }
  .others-list { border-top: 1px solid var(--border); padding-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .other-row { display: flex; align-items: center; gap: 12px; }
  .other-rank { width: 24px; height: 24px; border-radius: 50%; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); flex-shrink: 0; }
  .other-name { font-size: 0.85rem; flex: 1; }
  .other-pts { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--accent); font-weight: 600; }
  .other-bar { flex: 2; height: 4px; background: var(--bg2); border-radius: 2px; }
  .other-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); opacity: 0.4; transition: width 0.7s cubic-bezier(.17,.67,.35,1.2); }

  /* ── ROSTERS ── */
  .filter-row { display: flex; gap: 6px; margin-bottom: 2rem; flex-wrap: wrap; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; padding: 6px 16px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--border2); background: var(--surface2); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .rosters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
  .roster-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px var(--shadow); }
  .roster-card:hover { box-shadow: 0 4px 24px var(--shadow2); }
  .roster-head { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .roster-head-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; }
  .roster-head-pts { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent); font-weight: 700; }
  .roster-head-pts-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; text-align: right; }
  .player-row { padding: 10px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .role-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .role-Duelist { background: #c86050; } .role-Initiator { background: var(--accent2); }
  .role-Controller { background: #a882d8; } .role-Senti, .role-Sentinel { background: var(--accent3); }
  .role-unknown { background: var(--muted); }
  .player-info { flex: 1; }
  .player-info .pname { font-size: 0.85rem; font-weight: 500; }
  .player-info .pmeta { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }
  .player-pts-val { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--accent); font-weight: 600; min-width: 36px; text-align: right; }
  .player-pts-val.zero { color: var(--muted); font-size: 0.85rem; font-family: 'DM Sans'; }
  .breakdown-toggle { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.8rem; padding: 0 4px; }
  .match-breakdown { display: none; padding: 8px 20px 4px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .match-breakdown.open { display: block; }
  .mb-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.73rem; }
  .mb-label { color: var(--muted); font-family: 'DM Mono', monospace; }
  .mb-val { font-family: 'DM Mono', monospace; color: var(--text2); }
  .mb-val.scored { color: var(--accent); }

  /* ── POINTS ENTRY ── */
  .match-tabs-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .match-tab { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 6px 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .match-tab:hover { border-color: var(--accent); color: var(--accent); }
  .match-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .match-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .match-tab.has-data .match-dot { background: var(--accent3); }
  .match-tab.active .match-dot { background: rgba(255,255,255,0.6); }

  .pts-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .match-label-input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Playfair Display', serif; font-size: 1rem; padding: 9px 16px; width: 280px; transition: border-color 0.2s; box-shadow: 0 1px 4px var(--shadow); }
  .match-label-input:focus { outline: none; border-color: var(--accent); }
  .match-label-input::placeholder { color: var(--muted); font-style: italic; }
  .match-meta { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); }
  .group-toggle { display: flex; gap: 4px; background: var(--bg2); padding: 3px; border-radius: 20px; border: 1px solid var(--border); margin-left: auto; }
  .group-btn { background: none; border: none; border-radius: 16px; padding: 5px 14px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); transition: all 0.2s; white-space: nowrap; }
  .group-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px var(--shadow); }

  /* Manager section header */
  .pts-manager-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--mcolor, var(--border2)); background: color-mix(in srgb, var(--mcolor, var(--border2)) 8%, var(--surface)); }
  .pts-manager-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: #fff; flex-shrink: 0; background: var(--mcolor, var(--border2)); }
  .pts-manager-info { flex: 1; }
  .pts-manager-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--mcolor, var(--text)); line-height: 1.2; }
  .pts-manager-total { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
  .pts-manager-match-pts { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 600; color: var(--mcolor, var(--accent)); white-space: nowrap; }

  /* Team divider */
  .pts-team-header { display: flex; align-items: center; gap: 12px; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
  .pts-team-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .points-section { margin-bottom: 2rem; }
  .pts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
  .pts-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s; box-shadow: 0 1px 4px var(--shadow); }
  .pts-row:focus-within { border-color: var(--accent2); }
  .pts-row.elim-row { opacity: 0.35; }
  .pts-row.elim-row .prow-name { text-decoration: line-through; color: var(--muted); }
  .pts-row.elim-row .pts-input { pointer-events: none; color: var(--muted); border-color: var(--border); }
  .prow-info { flex: 1; }
  .prow-name { font-size: 0.83rem; font-weight: 500; }
  .prow-meta { font-size: 0.68rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }
  .prow-mgr-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pts-input { width: 60px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem; padding: 5px 8px; text-align: right; transition: all 0.2s; }
  .pts-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .pts-input.has-value { color: var(--accent); border-color: rgba(193,123,78,0.35); }
  .pts-input.saving { border-color: var(--gold); }

  /* ── ALL PLAYERS ── */
  .search-bar { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 11px 18px; margin-bottom: 1.25rem; transition: border-color 0.2s; box-shadow: 0 1px 4px var(--shadow); }
  .search-bar:focus { outline: none; border-color: var(--accent2); }
  .search-bar::placeholder { color: var(--muted); }
  .all-players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
  .ap-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 4px var(--shadow); }
  .ap-row:hover { border-color: var(--border2); }

  .save-toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 20px; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--accent3); opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; box-shadow: 0 4px 16px var(--shadow2); }
  .save-toast.show { opacity: 1; transform: translateY(0); }

  @media(max-width:640px) { main { padding: 1.5rem 1rem; } .hero-left h2 { font-size: 1.8rem; } nav button { padding: 7px 10px; font-size: 0.75rem; } .lb-layout { grid-template-columns: 1fr; } }

  /* ── ELIMINATED PLAYERS ── */
  .player-row.eliminated { opacity: 0.42; }
  .player-row.eliminated .pname { text-decoration: line-through; color: var(--muted); }
  .player-row.eliminated .player-pts-val { color: var(--muted); }
  .elim-badge { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 1px; padding: 2px 7px; border-radius: 8px; background: rgba(208,98,76,0.15); color: #d0624c; border: 1px solid rgba(208,98,76,0.25); flex-shrink: 0; }
  .player-row { cursor: pointer; transition: background 0.15s; }
  .player-row:hover { background: var(--surface2); }
  .elim-toggle-row { display: flex; align-items: center; gap: 10px; padding: 10px 20px 14px; border-bottom: 1px solid var(--border); }
  .elim-toggle-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 1.5px; color: var(--muted); }
  .elim-toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .elim-toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .elim-slider { position: absolute; inset: 0; background: var(--bg2); border: 1px solid var(--border2); border-radius: 20px; cursor: pointer; transition: background 0.2s, border-color 0.2s; }
  .elim-slider::before { content: ''; position: absolute; left: 2px; top: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--muted); transition: transform 0.2s, background 0.2s; }
  .elim-toggle-switch input:checked + .elim-slider { background: rgba(208,98,76,0.2); border-color: rgba(208,98,76,0.4); }
  .elim-toggle-switch input:checked + .elim-slider::before { transform: translateX(16px); background: #d0624c; }
  .elim-count { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-left: auto; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-ring"></div>
  <p>SYNCING DATA...</p>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-title">VCT <span>Fantasy</span></div>
      <div class="logo-sub">AMERICAS 2026</div>
    </div>
    <nav>
      <button class="active" onclick="showView('leaderboard', this)">Standings</button>
      <button onclick="showView('rosters', this)">Rosters</button>
      <button onclick="showView('points', this)">Points</button>
      <button onclick="showView('players', this)">Players</button>
    </nav>
  </div>
</header>

<main>
  <div class="hero">
    <div class="hero-left">
      <h2>VCT Americas<br><em>Fantasy League</em></h2>
      <p>// 5 MANAGERS · 8 PLAYERS EACH · AMERICAS 2026</p>
    </div>
    <div class="hero-right">
      <span class="pill">NRG · G2 · FURIA · LEVIATÁN · MORE</span>
      <span class="pill">5 MANAGERS</span>
      <span class="pill live">LIVE SYNC</span>
    </div>
  </div>

  <!-- STANDINGS -->
  <div id="view-leaderboard" class="view active">
    <div class="widgets-row">
      <div class="widget-card star">
        <div class="widget-label">⭐ TOP SCORER</div>
        <div class="widget-main" id="w-top-name">—</div>
        <div class="widget-sub" id="w-top-team">Loading…</div>
        <div class="widget-stat gold-text" id="w-top-pts"></div>
        <div id="w-top-owner" class="widget-owner-tag"></div>
      </div>

        placeholder="Name this match (e.g. QF vs NRG)" maxlength="40" oninput="handleLabelChange(this.value)" />

      <div class="group-toggle">

    <input type="text" class="search-bar" placeholder="Search players, teams…" oninput="filterPlayers(this.value)" />
    <div class="all-players-grid" id="all-players-grid"></div>
  </div>
</main>

<div class="save-toast" id="save-toast">✓ Saved</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNuRLMICo3kOmDAy3KY6R6nhCHFHB78pA",
  authDomain: "fantasy-league-pts.firebaseapp.com",
  databaseURL: "https://fantasy-league-pts-default-rtdb.firebaseio.com",
  projectId: "fantasy-league-pts",
  storageBucket: "fantasy-league-pts.firebasestorage.app",
  messagingSenderId: "225538768510",
  appId: "1:225538768510:web:f2647aeabd6cd78bb4e22f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const NUM_MATCHES = 12;

const MANAGER_COLORS = {
  'stephen': 'var(--m-stephen)', 'boy': 'var(--m-boy)', 'keith': 'var(--m-keith)',
  'owen': 'var(--m-owen)', 'derek': 'var(--m-derek)'
};
const mgrColor = (name) => MANAGER_COLORS[(name||'').toLowerCase()] || 'var(--border2)';

const managers = [
  { name: 'Stephen', players: ['Keiko','valyn','trent','jawgemo','Mazino','Timotino','lukxo','bao'] },
  { name: 'Boy',     players: ['aspas','BABYBAY','Ethan','eeiu','nerve','Less','saadhak','silentzz'] },
  { name: 'Keith',   players: ['Cryocells','Demon1','bang','Verno','vora','kiNgg','Neon','Reduxx'] },
  { name: 'Owen',    players: ['zekken','mada','tex','JonahP','Sato','Asuna','johnqt','leaf'] },
  { name: 'Derek',   players: ['brawk','cortezia','OXY','Xeppaa','v1c','Jerrwin','skuba','artzin'] },
];

const allPlayers = [
  {name:'brawk',team:'NRG',region:'Americas',role:'Initiator'},
  {name:'Keiko',team:'NRG',region:'Americas',role:'Controller'},
  {name:'Ethan',team:'NRG',region:'Americas',role:'Initiator'},
  {name:'mada',team:'NRG',region:'Americas',role:'Duelist'},
  {name:'skuba',team:'NRG',region:'Americas',role:'Senti'},
  {name:'valyn',team:'G2 Esports',region:'Americas',role:'Controller'},
  {name:'BABYBAY',team:'G2 Esports',region:'Americas',role:'Duelist'},
  {name:'jawgemo',team:'G2 Esports',region:'Americas',role:'Duelist'},
  {name:'trent',team:'G2 Esports',region:'Americas',role:'Initiator'},
  {name:'leaf',team:'G2 Esports',region:'Americas',role:'Senti'},
  {name:'eeiu',team:'FURIA',region:'Americas',role:'Initiator'},
  {name:'nerve',team:'FURIA',region:'Americas',role:'Senti'},
  {name:'artzin',team:'FURIA',region:'Americas',role:'Controller'},
  {name:'aspas',team:'MIBR',region:'Americas',role:'Duelist'},
  {name:'Mazino',team:'MIBR',region:'Americas',role:'Initiator'},
  {name:'zekken',team:'MIBR',region:'Americas',role:'Controller'},
  {name:'tex',team:'MIBR',region:'Americas',role:'Senti'},
  {name:'Verno',team:'MIBR',region:'Americas',role:'Initiator'},
  {name:'Cryocells',team:'100 Thieves',region:'Americas',role:'Senti'},
  {name:'bang',team:'100 Thieves',region:'Americas',role:'Controller'},
  {name:'vora',team:'100 Thieves',region:'Americas',role:'Initiator'},
  {name:'Timotino',team:'100 Thieves',region:'Americas',role:'Duelist'},
  {name:'Asuna',team:'100 Thieves',region:'Americas',role:'Initiator'},
  {name:'Demon1',team:'NV',region:'Americas',role:'Sentinel'},
  {name:'JonahP',team:'Sentinels',region:'Americas',role:'Initiator'},
  {name:'johnqt',team:'Sentinels',region:'Americas',role:'Controller'},
  {name:'cortezia',team:'Sentinels',region:'Americas',role:'Senti'},
  {name:'Reduxx',team:'Sentinels',region:'Americas',role:'Duelist'},
  {name:'Jerrwin',team:'Sentinels',region:'Americas',role:'Duelist'},
  {name:'kiNgg',team:'LEVIATÁN',region:'Americas',role:'Controller'},
  {name:'Neon',team:'LEVIATÁN',region:'Americas',role:'Duelist'},
  {name:'Sato',team:'LEVIATÁN',region:'Americas',role:'Duelist'},
  {name:'OXY',team:'Cloud9',region:'Americas',role:'Duelist'},
  {name:'Xeppaa',team:'Cloud9',region:'Americas',role:'Initiator'},
  {name:'v1c',team:'Cloud9',region:'Americas',role:'Controller'},
  {name:'Less',team:'KRÜ Esports',region:'Americas',role:'Senti'},
  {name:'saadhak',team:'KRÜ Esports',region:'Americas',role:'Controller'},
  {name:'silentzz',team:'KRÜ Esports',region:'Americas',role:'Controller'},
  {name:'lukxo',team:'LOUD',region:'Americas',role:'Senti'},
  {name:'bao',team:'Evil Geniuses',region:'Americas',role:'Senti'},
];

const seen = new Set();
const uniquePlayers = allPlayers.filter(p => { if(seen.has(p.name)) return false; seen.add(p.name); return true; });
const ownerOf = {};
managers.forEach(m => m.players.forEach(p => { ownerOf[p.toLowerCase()] = m.name; }));
const getPlayer = (name) => uniquePlayers.find(p => p.name.toLowerCase() === name.toLowerCase()) || {name, team:'?', region:'Americas', role:'unknown'};

let matchData = {}, activeMatchIdx = 1, pointsGroupMode = 'manager';
let eliminatedPlayers = new Set(); // persisted to Firebase

function getTotalPts(playerName) {
  const key = playerName.toLowerCase(); let total = 0;
  for (let i = 1; i <= NUM_MATCHES; i++) { const m = matchData[`match_${i}`]; if (m?.points?.[key]) total += (parseInt(m.points[key]) || 0); }
  return total;
}
function getMatchPts(playerName, matchIdx) {
  const key = playerName.toLowerCase(); const m = matchData[`match_${matchIdx}`];
  if (!m?.points) return 0; return parseInt(m.points[key]) || 0;
}
function getMatchLabel(matchIdx) { const m = matchData[`match_${matchIdx}`]; return m?.label || ''; }
function matchHasData(matchIdx) { const m = matchData[`match_${matchIdx}`]; if (!m?.points) return false; return Object.values(m.points).some(v => parseInt(v) > 0); }
function getManagerTotal(manager) { return manager.players.reduce((s, p) => s + getTotalPts(p), 0); }
function getManagerMatchTotal(manager, matchIdx) { return manager.players.reduce((s, p) => s + getMatchPts(p, matchIdx), 0); }
function getGamesPlayed(playerName) { let c = 0; for (let i = 1; i <= NUM_MATCHES; i++) if (matchHasData(i) && getMatchPts(playerName, i) > 0) c++; return c; }

onValue(ref(db, 'matchData'), (snapshot) => {
  // Also sync eliminated players
  onValue(ref(db, 'eliminatedPlayers'), (snap) => {
    const data = snap.val() || {};
    eliminatedPlayers = new Set(Object.keys(data).filter(k => data[k] === true));
    const el = document.getElementById('view-rosters');
    if (el?.classList.contains('active')) renderRosters();
  });
  matchData = snapshot.val() || {};
  const overlay = document.getElementById('loading-overlay');
  if (overlay) { overlay.classList.add('hidden'); setTimeout(() => overlay.remove(), 500); }
  refreshActive();
});

window.showView = (id, btn) => {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  refreshActive();
};

function refreshActive() {
  const views = ['leaderboard','rosters','points','players'];
  for (const v of views) {
    const el = document.getElementById('view-' + v);
    if (el?.classList.contains('active')) {
      if (v === 'leaderboard') renderLeaderboard();
      else if (v === 'rosters') renderRosters();
      else if (v === 'points') renderPointsEntry();
      else if (v === 'players') renderAllPlayers();
      break;
    }
  }
}

// ── WIDGETS ──
function renderWidgets() {
  const allDrafted = managers.flatMap(m => m.players);

  // Top scorer
  let topPlayer = null, topPts = -1;
  allDrafted.forEach(p => { const pts = getTotalPts(p); if (pts > topPts) { topPts = pts; topPlayer = p; } });
  if (topPlayer && topPts > 0) {
    const pd = getPlayer(topPlayer); const owner = ownerOf[topPlayer.toLowerCase()] || '—';
    const color = mgrColor(owner);
    document.getElementById('w-top-name').textContent = topPlayer;
    document.getElementById('w-top-team').textContent = pd.team + ' · ' + pd.role;
    document.getElementById('w-top-pts').textContent = topPts + ' pts total';
    const el = document.getElementById('w-top-owner'); el.textContent = owner;
    el.style.cssText = `background:color-mix(in srgb,${color} 15%,transparent);color:${color}`;
  } else {
    document.getElementById('w-top-name').textContent = 'No data yet';
    document.getElementById('w-top-team').textContent = 'Enter some match scores first';
  }

  // Biggest letdown (lowest avg pts per game, must have played ≥1)
  let worstPlayer = null, worstAvg = Infinity;
  allDrafted.forEach(p => { const g = getGamesPlayed(p); if (g === 0) return; const avg = getTotalPts(p) / g; if (avg < worstAvg) { worstAvg = avg; worstPlayer = p; } });
  if (worstPlayer) {
    const pd = getPlayer(worstPlayer); const owner = ownerOf[worstPlayer.toLowerCase()] || '—';
    const color = mgrColor(owner);
    document.getElementById('w-low-name').textContent = worstPlayer;
    document.getElementById('w-low-team').textContent = pd.team + ' · ' + pd.role;
    document.getElementById('w-low-pts').textContent = worstAvg.toFixed(1) + ' avg pts / game';
    const el = document.getElementById('w-low-owner'); el.textContent = owner;
    el.style.cssText = `background:color-mix(in srgb,${color} 15%,transparent);color:${color}`;
  } else {
    document.getElementById('w-low-name').textContent = 'No data yet';
    document.getElementById('w-low-team').textContent = 'Enter some match scores first';
  }

  // Best single match — highest pts any manager scored in one match
  let bestMgr = null, bestPts = 0, bestMatchIdx = 0;
  managers.forEach(m => {
    for (let i = 1; i <= NUM_MATCHES; i++) {
      if (!matchHasData(i)) continue;
      const pts = getManagerMatchTotal(m, i);
      if (pts > bestPts) { bestPts = pts; bestMgr = m; bestMatchIdx = i; }
    }
  });
  if (bestMgr) {
    const label = getMatchLabel(bestMatchIdx) || `Match ${bestMatchIdx}`;
    document.getElementById('w-hot-name').textContent = bestMgr.name;
    document.getElementById('w-hot-sub').textContent = label;
    document.getElementById('w-hot-pts').textContent = bestPts + ' pts';
  } else {
    document.getElementById('w-hot-name').textContent = 'No data yet';
    document.getElementById('w-hot-sub').textContent = 'Enter some match scores first';
    document.getElementById('w-hot-pts').textContent = '';
  }
}

// ── LEADERBOARD ──
function renderLeaderboard() {
  renderWidgets();
  const sorted = [...managers].map(m => ({...m, total: getManagerTotal(m)})).sort((a,b) => b.total - a.total);
  const rankClass = ['gold','silver','bronze'];
  const maxPts = Math.max(...sorted.map(m => m.total), 1);
  document.getElementById('lb-tbody').innerHTML = sorted.map((m, i) => `
    <tr>
      <td><span class="lb-rank ${rankClass[i]||''}">${i+1}</span></td>
      <td><div class="lb-name">${m.name}</div><div class="lb-players-preview">${m.players.slice(0,4).join(' · ')}</div></td>
      <td><span class="lb-pts">${m.total}</span></td>
    </tr>`).join('');

  const podium = document.getElementById('podium'); podium.innerHTML = '';
  const order = sorted.length >= 3 ? [sorted[1], sorted[0], sorted[2]] : sorted;
  const posClass = sorted.length >= 3 ? ['pos-2','pos-1','pos-3'] : ['pos-1'];
  order.forEach((m, i) => {
    const pos = posClass[i]; const num = pos === 'pos-1' ? '1' : pos === 'pos-2' ? '2' : '3';
    podium.innerHTML += `<div class="podium-slot ${pos}"><div class="podium-name">${m.name.toUpperCase()}</div><div class="podium-pts">${m.total}</div><div class="podium-bar"><span class="podium-pos">${num}</span></div></div>`;
  });

  const others = document.getElementById('others-list'); others.innerHTML = '';
  sorted.slice(3).forEach((m, i) => {
    others.innerHTML += `<div class="other-row"><div class="other-rank">${i+4}</div><div class="other-name">${m.name}</div><div class="other-bar"><div class="other-bar-fill" style="width:${(m.total/maxPts*100).toFixed(1)}%"></div></div><div class="other-pts">${m.total}</div></div>`;
  });
}

// ── ROSTERS ──
let rosterFilter = 'all';
window.filterRosters = (val, btn) => {
  rosterFilter = val;
  document.querySelectorAll('#roster-filter-tabs .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderRosters();
};
function renderRosters() {
  const sorted = [...managers].map(m => ({...m, total: getManagerTotal(m)})).sort((a,b) => b.total - a.total);
  document.getElementById('roster-grid').innerHTML = '';
  sorted.forEach(m => {
    if (rosterFilter !== 'all' && m.name !== rosterFilter) return;
    const card = document.createElement('div'); card.className = 'roster-card';
    const elimCount = m.players.filter(p => eliminatedPlayers.has(p.toLowerCase())).length;
    // Build player rows as DOM so we can attach click handlers
    const rowsFragment = document.createDocumentFragment();
    m.players.forEach(p => {
      const pd = getPlayer(p); const total = getTotalPts(p);
      const isElim = eliminatedPlayers.has(p.toLowerCase());
      const bdId = `bd-${m.name}-${p.replace(/\s/g,'_')}`;
      let mbRows = '';
      for (let i = 1; i <= NUM_MATCHES; i++) {
        if (!matchHasData(i)) continue;
        const v = getMatchPts(p, i); const lbl = getMatchLabel(i) || `Match ${i}`;
        mbRows += `<div class="mb-row"><span class="mb-label">${lbl}</span><span class="mb-val ${v>0?'scored':''}">${v>0?v:'—'}</span></div>`;
      }
      const playerRowEl = document.createElement('div');
      playerRowEl.className = 'player-row' + (isElim ? ' eliminated' : '');
      playerRowEl.title = isElim ? 'Click to mark as active' : 'Click to mark as eliminated';
      playerRowEl.innerHTML = `<span class="role-pip role-${pd.role}"></span><div class="player-info"><div class="pname">${p}</div><div class="pmeta">${pd.team}</div></div>${isElim ? '<span class="elim-badge">ELIM</span>' : ''}<span class="player-pts-val ${total===0?'zero':''}">${total>0?total:'—'}</span>${mbRows?`<button class="breakdown-toggle" onclick="event.stopPropagation();toggleBreakdown('${bdId}')">▾</button>`:''}`;
      playerRowEl.addEventListener('click', () => toggleEliminated(p));
      rowsFragment.appendChild(playerRowEl);
      if (mbRows) {
        const bd = document.createElement('div');
        bd.className = 'match-breakdown'; bd.id = bdId; bd.innerHTML = mbRows;
        rowsFragment.appendChild(bd);
      }
    });
    // Build header with elim toggle
    const switchId = `elim-switch-${m.name}`;
    const head = document.createElement('div'); head.innerHTML = `<div class="roster-head"><span class="roster-head-name">${m.name}</span><div style="text-align:right"><div class="roster-head-pts">${m.total}</div><div class="roster-head-pts-label">PTS</div></div></div>`;
    const toggleRow = document.createElement('div'); toggleRow.className = 'elim-toggle-row';
    toggleRow.innerHTML = `<span class="elim-toggle-label">SHOW ELIMINATED</span><label class="elim-toggle-switch"><input type="checkbox" id="${switchId}" ${elimCount > 0 ? '' : ''}><span class="elim-slider"></span></label><span class="elim-count">${elimCount > 0 ? elimCount + ' eliminated' : 'all active'}</span>`;
    card.appendChild(head.firstChild);
    card.appendChild(toggleRow);
    card.appendChild(rowsFragment);
    // Wire up the toggle switch to show/hide eliminated rows
    document.getElementById('roster-grid').appendChild(card);
    const sw = card.querySelector(`#${switchId}`);
    // Set initial state: if any eliminated, show them dimmed; switch controls hiding entirely
    sw.addEventListener('change', () => {
      card.querySelectorAll('.player-row.eliminated').forEach(r => {
        r.style.display = sw.checked ? '' : 'none';
        const next = r.nextElementSibling;
        if (next?.classList.contains('match-breakdown')) next.style.display = sw.checked ? '' : 'none';
      });
    });
    // Default: show eliminated rows (dimmed). Switch off = hide them.
    sw.checked = true;
  });
}
window.toggleBreakdown = (id) => { const el = document.getElementById(id); if (el) el.classList.toggle('open'); };

window.toggleEliminated = (playerName) => {
  const key = playerName.toLowerCase();
  const nowElim = !eliminatedPlayers.has(key);
  set(ref(db, `eliminatedPlayers/${key}`), nowElim ? true : null)
    .then(showToast).catch(console.error);
};

// ── POINTS ENTRY ──
window.setGroupMode = (mode, btn) => {
  pointsGroupMode = mode;
  document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderPointsGrid();
};

function renderMatchTabs() {
  const container = document.getElementById('match-tabs'); container.innerHTML = '';
  for (let i = 1; i <= NUM_MATCHES; i++) {
    const btn = document.createElement('button');
    btn.className = `match-tab ${i === activeMatchIdx ? 'active' : ''} ${matchHasData(i) ? 'has-data' : ''}`;
    btn.innerHTML = `<span class="match-dot"></span>${getMatchLabel(i) || 'Match ' + i}`;
    btn.onclick = () => selectMatch(i);
    container.appendChild(btn);
  }
}
function selectMatch(idx) {
  activeMatchIdx = idx; renderMatchTabs();
  document.getElementById('match-label-input').value = getMatchLabel(idx);
  updateMatchMeta(); renderPointsGrid();
}
function updateMatchMeta() {
  const all = managers.flatMap(m => m.players);
  const scored = all.filter(p => getMatchPts(p, activeMatchIdx) > 0).length;
  document.getElementById('match-meta-info').textContent = scored > 0 ? `${scored} / ${all.length} players scored` : 'No scores yet';
}
function renderPointsEntry() {
  renderMatchTabs();
  document.getElementById('match-label-input').value = getMatchLabel(activeMatchIdx);
  updateMatchMeta(); renderPointsGrid();
}

function makePlayerRow(p, managerName) {
  const pd = getPlayer(p); const p_pts = getMatchPts(p, activeMatchIdx);
  const color = mgrColor(managerName);
  const isElim = eliminatedPlayers.has(p.toLowerCase());
  const row = document.createElement('div'); row.className = 'pts-row' + (isElim ? ' elim-row' : '');
  row.innerHTML = `
    <span class="role-pip role-${pd.role}"></span>
    <div class="prow-info">
      <div class="prow-name">${p}</div>
      <div class="prow-meta">${pd.team}</div>
    </div>
    ${isElim ? '<span class="elim-badge">ELIM</span>' : `<span class="prow-mgr-dot" style="background:${color}" title="${managerName}"></span>`}
    <input class="pts-input ${p_pts !== null && p_pts !== undefined ? 'has-value' : ''}" type="number"
      value="${p_pts !== null && p_pts !== undefined ? p_pts : ''}" placeholder="0"
      data-player="${p.toLowerCase()}" data-match="${activeMatchIdx}"
      onchange="handlePtsChange(this)" oninput="handlePtsChange(this)" />`;
  return row;
}

function renderPointsGrid() {
  const grid = document.getElementById('points-grid'); grid.innerHTML = '';

  if (pointsGroupMode === 'manager') {
    managers.forEach(m => {
      const color = mgrColor(m.name);
      const matchTotal = getManagerMatchTotal(m, activeMatchIdx);
      const sec = document.createElement('div'); sec.className = 'points-section';

      // Prominent manager header
      const header = document.createElement('div');
      header.className = 'pts-manager-header';
      header.style.cssText = `--mcolor:${color}`;
      header.dataset.mgr = m.name;
      header.innerHTML = `
        <div class="pts-manager-avatar">${m.name[0]}</div>
        <div class="pts-manager-info">
          <div class="pts-manager-name">${m.name}</div>
          <div class="pts-manager-total">${getManagerTotal(m)} pts overall</div>
        </div>
        <div class="pts-manager-match-pts" id="hdr-match-${m.name}">${matchTotal > 0 ? '＋' + matchTotal + ' this match' : '—'}</div>`;

      const rowsGrid = document.createElement('div'); rowsGrid.className = 'pts-grid';
      m.players.forEach(p => rowsGrid.appendChild(makePlayerRow(p, m.name)));
      sec.appendChild(header); sec.appendChild(rowsGrid);
      grid.appendChild(sec);
    });
  } else {
    // Group by team
    const teamMap = {};
    managers.forEach(m => m.players.forEach(p => {
      const pd = getPlayer(p); const team = pd.team;
      if (!teamMap[team]) teamMap[team] = [];
      teamMap[team].push({ player: p, manager: m.name });
    }));
    Object.keys(teamMap).sort().forEach(team => {
      const sec = document.createElement('div'); sec.className = 'points-section';
      const header = document.createElement('div');
      header.className = 'pts-team-header'; header.textContent = team;
      const rowsGrid = document.createElement('div'); rowsGrid.className = 'pts-grid';
      teamMap[team].forEach(({ player, manager }) => rowsGrid.appendChild(makePlayerRow(player, manager)));
      sec.appendChild(header); sec.appendChild(rowsGrid);
      grid.appendChild(sec);
    });
  }
}

// ── ALL PLAYERS ──
let currentSearch = '';
window.filterPlayers = (val) => { currentSearch = val.toLowerCase(); renderAllPlayers(); };
function renderAllPlayers() {
  document.getElementById('all-players-grid').innerHTML = '';
  uniquePlayers.filter(p => {
    if (currentSearch && !p.name.toLowerCase().includes(currentSearch) && !p.team.toLowerCase().includes(currentSearch)) return false;
    return true;
  }).forEach(p => {
    const owner = ownerOf[p.name.toLowerCase()] || '—'; const total = getTotalPts(p.name);
    const color = owner !== '—' ? mgrColor(owner) : 'var(--border2)';
    const row = document.createElement('div'); row.className = 'ap-row';
    row.innerHTML = `
      <span class="role-pip role-${p.role}"></span>
      <div class="player-info" style="flex:1">
        <div class="pname">${p.name}</div>
        <div class="pmeta" style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted)">${p.team} · ${p.role}</div>
      </div>
      <span style="font-size:0.65rem;font-family:'DM Mono',monospace;padding:2px 9px;border-radius:10px;background:color-mix(in srgb,${color} 15%,transparent);color:${color}">${owner}</span>
      <span style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--accent);font-weight:600;min-width:36px;text-align:right">${total || '—'}</span>`;
    document.getElementById('all-players-grid').appendChild(row);
  });
}

// ── SAVE ──
const labelTimers = {};
window.handleLabelChange = (val) => {
  const idx = activeMatchIdx; clearTimeout(labelTimers[idx]);
  labelTimers[idx] = setTimeout(() => { set(ref(db, `matchData/match_${idx}/label`), val.trim() || null).then(showToast).catch(console.error); }, 400);
};

const saveTimers = {};
window.handlePtsChange = (input) => {
  const player = input.dataset.player; const matchIdx = parseInt(input.dataset.match);
  // If field is empty, treat as not entered (null). Otherwise parse (negatives allowed).
  const raw = input.value;
  const isEmpty = raw === '' || raw === null || raw === undefined;
  let val = isEmpty ? null : (parseInt(raw) || 0);
  if (!matchData[`match_${matchIdx}`]) matchData[`match_${matchIdx}`] = { points: {} };
  if (!matchData[`match_${matchIdx}`].points) matchData[`match_${matchIdx}`].points = {};
  matchData[`match_${matchIdx}`].points[player] = val;
  // has-value: true if a value was explicitly entered (including 0)
  input.classList.toggle('has-value', val !== null); input.classList.add('saving');
  updateMatchMeta();
  const tabs = document.querySelectorAll('.match-tab');
  if (tabs[matchIdx-1]) tabs[matchIdx-1].classList.toggle('has-data', matchHasData(matchIdx));
  // Live update manager match total in header
  if (pointsGroupMode === 'manager') {
    const ownerName = ownerOf[player];
    if (ownerName) {
      const mgr = managers.find(m => m.name.toLowerCase() === ownerName.toLowerCase());
      if (mgr) {
        const el = document.getElementById(`hdr-match-${mgr.name}`);
        if (el) { const t = getManagerMatchTotal(mgr, matchIdx); el.textContent = t !== null && t > 0 ? '＋' + t + ' this match' : t === 0 ? '＋0 this match' : '—'; }
      }
    }
  }
  const timerKey = `${matchIdx}_${player}`; clearTimeout(saveTimers[timerKey]);
  saveTimers[timerKey] = setTimeout(() => {
    const saveVal = val === null ? null : val;
    set(ref(db, `matchData/match_${matchIdx}/points/${player}`), saveVal)
      .then(() => { input.classList.remove('saving'); showToast(); })
      .catch(err => { console.error(err); input.classList.remove('saving'); });
  }, 300);
};

function showToast() {
  const t = document.getElementById('save-toast'); t.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
</body>
