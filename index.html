<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCT Americas 2026 — Fantasy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --bg2: #ede9e2;
    --surface: #ffffff;
    --surface2: #f9f7f4;
    --border: #e2ddd6;
    --border2: #cec9c0;
    --text: #2a2520;
    --text2: #6b6258;
    --muted: #9b9088;
    --accent: #c17b4e;
    --accent2: #5b8fa8;
    --accent3: #7a9e6e;
    --gold: #c9a227;
    --silver: #8a9aaa;
    --bronze: #a06a3a;
    --shadow: rgba(42,37,32,0.08);
    --shadow2: rgba(42,37,32,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(193,123,78,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(91,143,168,0.06) 0%, transparent 60%);
  }

  /* ── LOADING ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 20px; transition: opacity 0.5s ease;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-ring {
    width: 48px; height: 48px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; }

  /* ── HEADER ── */
  header {
    background: rgba(245,242,238,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 0 2rem;
  }
  .header-inner {
    max-width: 1300px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px; gap: 1rem;
  }
  .logo { display: flex; align-items: baseline; gap: 10px; }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem; font-weight: 700;
    color: var(--text); letter-spacing: 0.5px;
  }
  .logo-title span { color: var(--accent); }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 1.5px; padding-bottom: 2px;
  }
  nav { display: flex; gap: 2px; }
  nav button {
    background: none; border: none; color: var(--text2);
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    font-weight: 400; padding: 8px 16px; cursor: pointer;
    border-radius: 20px; transition: all 0.2s; letter-spacing: 0.3px;
  }
  nav button:hover { background: var(--bg2); color: var(--text); }
  nav button.active { background: var(--text); color: var(--bg); }

  /* ── MAIN ── */
  main { max-width: 1300px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

  /* ── HERO ── */
  .hero {
    margin-bottom: 3rem;
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 1.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2rem;
  }
  .hero-left h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem; font-weight: 700;
    line-height: 1.1; color: var(--text);
    margin-bottom: 8px;
  }
  .hero-left h2 em { color: var(--accent); font-style: italic; }
  .hero-left p { color: var(--muted); font-size: 0.82rem; font-family: 'DM Mono', monospace; letter-spacing: 0.5px; }
  .hero-right { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .pill {
    padding: 5px 14px; border-radius: 20px; font-size: 0.72rem;
    font-family: 'DM Mono', monospace; letter-spacing: 0.5px;
    border: 1px solid var(--border2); color: var(--text2); background: var(--surface);
  }
  .pill.live { border-color: var(--accent3); color: var(--accent3); background: rgba(122,158,110,0.08); display: flex; align-items: center; gap: 6px; }
  .pill.live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); animation: blink 1.8s ease-in-out infinite; flex-shrink: 0; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── VIEWS ── */
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ── LEADERBOARD ── */
  .lb-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  @media(max-width:900px) { .lb-layout { grid-template-columns: 1fr; } }

  .lb-table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px var(--shadow);
  }
  .card-label {
    padding: 16px 20px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 2px; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table td { padding: 13px 20px; border-bottom: 1px solid var(--border); }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-table tr:hover td { background: var(--surface2); }
  .lb-rank { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); width: 28px; }
  .lb-rank.gold { color: var(--gold); } .lb-rank.silver { color: var(--silver); } .lb-rank.bronze { color: var(--bronze); }
  .lb-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
  .lb-players-preview { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .lb-pts { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent); text-align: right; font-weight: 700; }

  /* ── PODIUM ── */
  .podium-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 2px 16px var(--shadow); }
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; height: 180px; margin-bottom: 20px; }
  .podium-slot { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; }
  .podium-name { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 1px; color: var(--text2); margin-bottom: 6px; text-align: center; }
  .podium-pts { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
  .podium-bar { width: 100%; border-radius: 8px 8px 0 0; position: relative; display: flex; align-items: center; justify-content: center; }
  .podium-pos { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: rgba(255,255,255,0.7); }
  .pos-1 .podium-bar { background: linear-gradient(to top, #c9a22799, #c9a22730); height: 120px; }
  .pos-2 .podium-bar { background: linear-gradient(to top, #8a9aaa99, #8a9aaa30); height: 90px; }
  .pos-3 .podium-bar { background: linear-gradient(to top, #a06a3a99, #a06a3a30); height: 70px; }
  .others-list { border-top: 1px solid var(--border); padding-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .other-row { display: flex; align-items: center; gap: 12px; }
  .other-rank { width: 24px; height: 24px; border-radius: 50%; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); flex-shrink: 0; }
  .other-name { font-size: 0.85rem; flex: 1; }
  .other-pts { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--accent); font-weight: 600; }
  .other-bar { flex: 2; height: 4px; background: var(--bg2); border-radius: 2px; }
  .other-bar-fill { height: 100%; border-radius: 2px; background: var(--border2); transition: width 0.7s cubic-bezier(.17,.67,.35,1.2); }

  /* ── ROSTERS ── */
  .filter-row { display: flex; gap: 6px; margin-bottom: 2rem; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
    padding: 6px 16px; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--border2); background: var(--surface2); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .rosters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
  .roster-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow); transition: box-shadow 0.2s;
  }
  .roster-card:hover { box-shadow: 0 4px 24px var(--shadow2); }
  .roster-head {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2); border-bottom: 1px solid var(--border);
  }
  .roster-head-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; }
  .roster-head-pts { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent); font-weight: 700; }
  .roster-head-pts-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; text-align: right; }
  .player-row {
    padding: 10px 20px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .player-row:last-child { border-bottom: none; }
  .role-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .role-Duelist { background: #d0624c; }
  .role-Initiator { background: var(--accent2); }
  .role-Controller { background: #9575cd; }
  .role-Senti, .role-Sentinel { background: var(--accent3); }
  .role-unknown { background: var(--muted); }
  .player-info { flex: 1; }
  .player-info .pname { font-size: 0.85rem; font-weight: 500; }
  .player-info .pmeta { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }
  .player-pts-val { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--accent); font-weight: 600; min-width: 36px; text-align: right; }
  .player-pts-val.zero { color: var(--muted); font-size: 0.85rem; font-family: 'DM Sans'; }
  .breakdown-toggle { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.8rem; padding: 0 4px; transition: color 0.2s; }
  .breakdown-toggle:hover { color: var(--text); }
  .match-breakdown { display: none; padding: 8px 20px 4px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .match-breakdown.open { display: block; }
  .mb-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.73rem; }
  .mb-label { color: var(--muted); font-family: 'DM Mono', monospace; }
  .mb-val { font-family: 'DM Mono', monospace; color: var(--text2); }
  .mb-val.scored { color: var(--accent); }

  /* ── POINTS ENTRY ── */
  .match-tabs-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .match-tab {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    color: var(--text2); font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.5px;
    padding: 6px 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .match-tab:hover { border-color: var(--accent); color: var(--accent); }
  .match-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .match-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
  .match-tab.has-data .match-dot { background: var(--accent3); }
  .match-tab.active .match-dot { background: rgba(255,255,255,0.6); }

  .match-label-row { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; flex-wrap: wrap; }
  .match-label-input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Playfair Display', serif; font-size: 1rem;
    padding: 9px 16px; width: 300px; transition: border-color 0.2s;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .match-label-input:focus { outline: none; border-color: var(--accent); }
  .match-label-input::placeholder { color: var(--muted); font-style: italic; }
  .match-meta { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); }

  .points-section { margin-bottom: 2rem; }
  .section-divider {
    display: flex; align-items: center; gap: 12px;
    font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 2px; color: var(--muted);
    margin-bottom: 1rem;
  }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .pts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
  .pts-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    transition: border-color 0.15s; box-shadow: 0 1px 4px var(--shadow);
  }
  .pts-row:focus-within { border-color: var(--accent2); }
  .prow-info { flex: 1; }
  .prow-name { font-size: 0.83rem; font-weight: 500; }
  .prow-meta { font-size: 0.68rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }
  .prow-owner { font-size: 0.65rem; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 10px; background: var(--bg2); color: var(--muted); }
  .pts-input {
    width: 60px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 0.85rem; padding: 5px 8px; text-align: right; transition: all 0.2s;
  }
  .pts-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .pts-input.has-value { color: var(--accent); border-color: rgba(193,123,78,0.35); }
  .pts-input.saving { border-color: var(--gold); }

  /* ── ALL PLAYERS ── */
  .search-bar {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    padding: 11px 18px; margin-bottom: 1.25rem; transition: border-color 0.2s;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .search-bar:focus { outline: none; border-color: var(--accent2); }
  .search-bar::placeholder { color: var(--muted); }
  .all-players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
  .ap-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 1px 4px var(--shadow); transition: border-color 0.2s;
  }
  .ap-row:hover { border-color: var(--border2); }
  .region-tag { font-size: 0.62rem; font-family: 'DM Mono', monospace; padding: 2px 7px; border-radius: 8px; }
  .region-Americas { background: rgba(91,143,168,0.12); color: var(--accent2); }
  .region-EMEA { background: rgba(149,117,205,0.12); color: #9575cd; }
  .region-Pacific { background: rgba(122,158,110,0.12); color: var(--accent3); }
  .region-China { background: rgba(193,123,78,0.12); color: var(--accent); }

  /* ── TOAST ── */
  .save-toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 10px; padding: 10px 20px;
    font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--accent3);
    opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999;
    box-shadow: 0 4px 16px var(--shadow2);
  }
  .save-toast.show { opacity: 1; transform: translateY(0); }

  @media(max-width:640px) {
    main { padding: 1.5rem 1rem; }
    .hero-left h2 { font-size: 1.8rem; }
    nav button { padding: 7px 10px; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-ring"></div>
  <p>SYNCING DATA...</p>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-title">VCT <span>Fantasy</span></div>
      <div class="logo-sub">AMERICAS 2026</div>
    </div>
    <nav>
      <button class="active" onclick="showView('leaderboard', this)">Standings</button>
      <button onclick="showView('rosters', this)">Rosters</button>
      <button onclick="showView('points', this)">Points</button>
      <button onclick="showView('players', this)">Players</button>
    </nav>
  </div>
</header>

<main>
  <div class="hero">
    <div class="hero-left">
      <h2>VCT Americas<br><em>Fantasy League</em></h2>
      <p>// 5 MANAGERS · 8 PLAYERS EACH · AMERICAS 2026</p>
    </div>
    <div class="hero-right">
      <span class="pill">NRG · G2 · FURIA · LEVIATÁN · MORE</span>
      <span class="pill">5 MANAGERS</span>
      <span class="pill live">LIVE SYNC</span>
    </div>
  </div>

  <!-- STANDINGS -->
  <div id="view-leaderboard" class="view active">
    <div class="lb-layout">
      <div class="lb-table-card">
        <div class="card-label">RANKINGS</div>
        <table class="lb-table"><tbody id="lb-tbody"></tbody></table>
      </div>
      <div class="podium-wrap">
        <div class="card-label" style="padding:0 0 12px;border:none">TOP 3</div>
        <div class="podium" id="podium"></div>
        <div class="others-list" id="others-list"></div>
      </div>
    </div>
  </div>

  <!-- ROSTERS -->
  <div id="view-rosters" class="view">
    <div class="filter-row" id="roster-filter-tabs">
      <button class="filter-btn active" onclick="filterRosters('all',this)">All</button>
      <button class="filter-btn" onclick="filterRosters('Stephen',this)">Stephen</button>
      <button class="filter-btn" onclick="filterRosters('Boy',this)">Boy</button>
      <button class="filter-btn" onclick="filterRosters('Keith',this)">Keith</button>
      <button class="filter-btn" onclick="filterRosters('Owen',this)">Owen</button>
      <button class="filter-btn" onclick="filterRosters('Derek',this)">Derek</button>
    </div>
    <div class="rosters-grid" id="roster-grid"></div>
  </div>

  <!-- POINTS ENTRY -->
  <div id="view-points" class="view">
    <div class="match-tabs-row" id="match-tabs"></div>
    <div class="match-label-row">
      <input type="text" class="match-label-input" id="match-label-input"
        placeholder="Name this match (e.g. QF vs NRG)"
        maxlength="40" oninput="handleLabelChange(this.value)" />
      <span class="match-meta" id="match-meta-info"></span>
    </div>
    <div id="points-grid"></div>
  </div>

  <!-- ALL PLAYERS -->
  <div id="view-players" class="view">
    <input type="text" class="search-bar" placeholder="Search players, teams…" oninput="filterPlayers(this.value)" />
    <div class="filter-row" id="region-tabs">
      <button class="filter-btn active" onclick="filterRegion('all',this)">All Regions</button>
      <button class="filter-btn" onclick="filterRegion('Americas',this)">Americas</button>
      <button class="filter-btn" onclick="filterRegion('EMEA',this)">EMEA</button>
      <button class="filter-btn" onclick="filterRegion('Pacific',this)">Pacific</button>
      <button class="filter-btn" onclick="filterRegion('China',this)">China</button>
    </div>
    <div class="all-players-grid" id="all-players-grid"></div>
  </div>
</main>

<div class="save-toast" id="save-toast">✓ Saved</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNuRLMICo3kOmDAy3KY6R6nhCHFHB78pA",
  authDomain: "fantasy-league-pts.firebaseapp.com",
  databaseURL: "https://fantasy-league-pts-default-rtdb.firebaseio.com",
  projectId: "fantasy-league-pts",
  storageBucket: "fantasy-league-pts.firebasestorage.app",
  messagingSenderId: "225538768510",
  appId: "1:225538768510:web:f2647aeabd6cd78bb4e22f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const NUM_MATCHES = 12;

// ── ROSTER DATA (from VCT2026 Americas Fantasy Draft CSV) ──
const managers = [
  { name: 'Stephen', players: ['Keiko','valyn','trent','jawgemo','Mazino','Timotino','lukxo','bao'] },
  { name: 'Boy',     players: ['aspas','BABYBAY','Ethan','eeiu','nerve','Less','saadhak','silentzz'] },
  { name: 'Keith',   players: ['Cryocells','Demon1','bang','Verno','vora','kiNgg','Neon','Reduxx'] },

// All VCT Americas players (extended pool)

// Deduplicate (keep first occurrence per name)
const seen = new Set();
const uniquePlayers = allPlayers.filter(p => { if(seen.has(p.name)) return false; seen.add(p.name); return true; });

const ownerOf = {};
managers.forEach(m => m.players.forEach(p => { ownerOf[p.toLowerCase()] = m.name; }));

const getPlayer = (name) => uniquePlayers.find(p => p.name.toLowerCase() === name.toLowerCase())
  || { name, team: '?', region: 'Americas', role: 'unknown' };

let matchData = {};
let activeMatchIdx = 1;

function getTotalPts(playerName) {
  const key = playerName.toLowerCase();
  let total = 0;
  for (let i = 1; i <= NUM_MATCHES; i++) {
    const m = matchData[`match_${i}`];
    if (m && m.points && m.points[key]) total += (parseInt(m.points[key]) || 0);
  }
  return total;
}
function getMatchPts(playerName, matchIdx) {
  const key = playerName.toLowerCase();
  const m = matchData[`match_${matchIdx}`];
  if (!m || !m.points) return 0;
  return parseInt(m.points[key]) || 0;
}
function getMatchLabel(matchIdx) {
  const m = matchData[`match_${matchIdx}`];
  return (m && m.label) ? m.label : '';
}
function matchHasData(matchIdx) {
  const m = matchData[`match_${matchIdx}`];
  if (!m || !m.points) return false;
  return Object.values(m.points).some(v => parseInt(v) > 0);
}
function getManagerTotal(manager) {
  return manager.players.reduce((s, p) => s + getTotalPts(p), 0);
}

// ── FIREBASE ──
onValue(ref(db, 'matchData'), (snapshot) => {
  matchData = snapshot.val() || {};
  const overlay = document.getElementById('loading-overlay');
  if (overlay) { overlay.classList.add('hidden'); setTimeout(() => overlay.remove(), 500); }
  refreshActive();
});

// ── NAV ──
window.showView = (id, btn) => {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  refreshActive();
};

function refreshActive() {
  const lb = document.getElementById('view-leaderboard');
  const ro = document.getElementById('view-rosters');
  const pt = document.getElementById('view-points');
  const pl = document.getElementById('view-players');
  if (lb && lb.classList.contains('active')) renderLeaderboard();
  else if (ro && ro.classList.contains('active')) renderRosters();
  else if (pt && pt.classList.contains('active')) renderPointsEntry();
  else if (pl && pl.classList.contains('active')) renderAllPlayers();
}

// ── LEADERBOARD ──
function renderLeaderboard() {
  const sorted = [...managers].map(m => ({...m, total: getManagerTotal(m)})).sort((a,b) => b.total - a.total);
  const rankClass = ['gold','silver','bronze'];
  const maxPts = Math.max(...sorted.map(m => m.total), 1);

  document.getElementById('lb-tbody').innerHTML = sorted.map((m, i) => `
    <tr>
      <td><span class="lb-rank ${rankClass[i]||''}">${i+1}</span></td>
      <td>
        <div class="lb-name">${m.name}</div>
        <div class="lb-players-preview">${m.players.slice(0,4).join(' · ')}</div>
      </td>
      <td><span class="lb-pts">${m.total}</span></td>
    </tr>`).join('');

  // Podium (top 3)
  const podium = document.getElementById('podium');
  podium.innerHTML = '';
  const order = sorted.length >= 3 ? [sorted[1], sorted[0], sorted[2]] : sorted;
  const posClass = sorted.length >= 3 ? ['pos-2','pos-1','pos-3'] : ['pos-1','pos-2','pos-3'];
  order.forEach((m, i) => {
    const pos = posClass[i];
    podium.innerHTML += `<div class="podium-slot ${pos}">
      <div class="podium-name">${m.name.toUpperCase()}</div>
      <div class="podium-pts">${m.total}</div>
      <div class="podium-bar"><span class="podium-pos">${pos === 'pos-1' ? '1' : pos === 'pos-2' ? '2' : '3'}</span></div>
    </div>`;
  });

  // Others (4+)
  const others = document.getElementById('others-list');
  others.innerHTML = '';
  sorted.slice(3).forEach((m, i) => {
    others.innerHTML += `<div class="other-row">
      <div class="other-rank">${i+4}</div>
      <div class="other-name">${m.name}</div>
      <div class="other-bar"><div class="other-bar-fill" style="width:${(m.total/maxPts*100).toFixed(1)}%"></div></div>
      <div class="other-pts">${m.total}</div>
    </div>`;
  });
}

// ── ROSTERS ──
let rosterFilter = 'all';
window.filterRosters = (val, btn) => {
  rosterFilter = val;
  document.querySelectorAll('#roster-filter-tabs .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderRosters();
};

function renderRosters() {
  const sorted = [...managers].map(m => ({...m, total: getManagerTotal(m)})).sort((a,b) => b.total - a.total);
  document.getElementById('roster-grid').innerHTML = '';
  sorted.forEach(m => {
    if (rosterFilter !== 'all' && m.name !== rosterFilter) return;
    const card = document.createElement('div');
    card.className = 'roster-card';
    let rows = '';
    m.players.forEach(p => {
      const pd = getPlayer(p);
      const total = getTotalPts(p);
      const bdId = `bd-${m.name}-${p.replace(/\s/g,'_')}`;

      let mbRows = '';
      for (let i = 1; i <= NUM_MATCHES; i++) {
        if (!matchHasData(i)) continue;
        const v = getMatchPts(p, i);
        const lbl = getMatchLabel(i) || `Match ${i}`;
        mbRows += `<div class="mb-row"><span class="mb-label">${lbl}</span><span class="mb-val ${v>0?'scored':''}">${v>0?v:'—'}</span></div>`;
      }

      rows += `
        <div class="player-row">
          <span class="role-pip role-${pd.role}"></span>
          <div class="player-info">
            <div class="pname">${p}</div>
            <div class="pmeta">${pd.team}</div>
          </div>
          <span class="player-pts-val ${total===0?'zero':''}">${total>0?total:'—'}</span>
          ${mbRows ? `<button class="breakdown-toggle" onclick="toggleBreakdown('${bdId}')" title="Match breakdown">▾</button>` : ''}
        </div>
        ${mbRows ? `<div class="match-breakdown" id="${bdId}">${mbRows}</div>` : ''}`;
    });
    card.innerHTML = `
      <div class="roster-head">
        <span class="roster-head-name">${m.name}</span>
        <div style="text-align:right"><div class="roster-head-pts">${m.total}</div><div class="roster-head-pts-label">PTS</div></div>
      </div>
      ${rows}`;
    document.getElementById('roster-grid').appendChild(card);
  });
}

window.toggleBreakdown = (id) => {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
};

// ── POINTS ENTRY ──
function renderMatchTabs() {
  const container = document.getElementById('match-tabs');
  container.innerHTML = '';
  for (let i = 1; i <= NUM_MATCHES; i++) {
    const btn = document.createElement('button');
    btn.className = `match-tab ${i === activeMatchIdx ? 'active' : ''} ${matchHasData(i) ? 'has-data' : ''}`;
    const label = getMatchLabel(i) || `Match ${i}`;
    btn.innerHTML = `<span class="match-dot"></span>${label}`;
    btn.onclick = () => selectMatch(i);
    container.appendChild(btn);
  }
}

function selectMatch(idx) {
  activeMatchIdx = idx;
  renderMatchTabs();
  document.getElementById('match-label-input').value = getMatchLabel(idx);
  updateMatchMeta();
  renderPointsGrid();
}

function updateMatchMeta() {
  const allDraftedPlayers = managers.flatMap(m => m.players);
  const scored = allDraftedPlayers.filter(p => getMatchPts(p, activeMatchIdx) > 0).length;
  document.getElementById('match-meta-info').textContent =
    scored > 0 ? `${scored} / ${allDraftedPlayers.length} players scored` : 'No scores yet';
}

function renderPointsEntry() {
  renderMatchTabs();
  document.getElementById('match-label-input').value = getMatchLabel(activeMatchIdx);
  updateMatchMeta();
  renderPointsGrid();
}

function renderPointsGrid() {
  const grid = document.getElementById('points-grid');
  grid.innerHTML = '';

  // Group all drafted players by their team region (just show all drafted players grouped by manager)
  managers.forEach(m => {
    const sec = document.createElement('div');
    sec.className = 'points-section';
    sec.innerHTML = `<div class="section-divider">${m.name.toUpperCase()}</div><div class="pts-grid" id="ptsgrid-${m.name}"></div>`;
    grid.appendChild(sec);

    const rowsGrid = sec.querySelector(`#ptsgrid-${m.name}`);
    m.players.forEach(p => {
      const pd = getPlayer(p);
      const p_pts = getMatchPts(p, activeMatchIdx);
      const row = document.createElement('div');
      row.className = 'pts-row';
      row.innerHTML = `
        <span class="role-pip role-${pd.role}"></span>
        <div class="prow-info">
          <div class="prow-name">${p}</div>
          <div class="prow-meta">${pd.team}</div>
        </div>
        <input class="pts-input ${p_pts > 0 ? 'has-value' : ''}" type="number" min="0"
          value="${p_pts > 0 ? p_pts : ''}" placeholder="0"
          data-player="${p.toLowerCase()}" data-match="${activeMatchIdx}"
          onchange="handlePtsChange(this)" oninput="handlePtsChange(this)" />`;
      rowsGrid.appendChild(row);
    });
  });
}

// ── ALL PLAYERS ──
let currentRegion = 'all', currentSearch = '';
window.filterRegion = (region, btn) => {
  currentRegion = region;
  document.querySelectorAll('#region-tabs .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderAllPlayers();
};
window.filterPlayers = (val) => { currentSearch = val.toLowerCase(); renderAllPlayers(); };

function renderAllPlayers() {
  document.getElementById('all-players-grid').innerHTML = '';
  uniquePlayers.filter(p => {
    if (currentRegion !== 'all' && p.region !== currentRegion) return false;
    if (currentSearch && !p.name.toLowerCase().includes(currentSearch) && !p.team.toLowerCase().includes(currentSearch)) return false;
    return true;
  }).forEach(p => {
    const owner = ownerOf[p.name.toLowerCase()] || '—';
    const total = getTotalPts(p.name);
    const row = document.createElement('div');
    row.className = 'ap-row';
    row.innerHTML = `
      <span class="role-pip role-${p.role}"></span>
      <div class="player-info" style="flex:1">
        <div class="pname">${p.name}</div>
        <div class="pmeta">${p.team} · <span class="region-tag region-${p.region}">${p.region}</span></div>
      </div>
      <span style="font-size:0.7rem;font-family:'DM Mono',monospace;background:var(--bg2);padding:2px 8px;border-radius:10px;color:var(--muted)">${owner}</span>
      <span style="font-family:'Playfair Display',serif;font-size:1rem;color:var(--accent);font-weight:600;min-width:36px;text-align:right">${total || '—'}</span>`;
    document.getElementById('all-players-grid').appendChild(row);
  });
}

// ── SAVE TO FIREBASE ──
const labelTimers = {};
window.handleLabelChange = (val) => {
  const idx = activeMatchIdx;
  clearTimeout(labelTimers[idx]);
  labelTimers[idx] = setTimeout(() => {
    set(ref(db, `matchData/match_${idx}/label`), val.trim() || null)
      .then(() => showToast()).catch(console.error);
  }, 400);
};

const saveTimers = {};
window.handlePtsChange = (input) => {
  const player = input.dataset.player;
  const matchIdx = parseInt(input.dataset.match);
  const val = parseInt(input.value) || 0;
  if (!matchData[`match_${matchIdx}`]) matchData[`match_${matchIdx}`] = { points: {} };
  if (!matchData[`match_${matchIdx}`].points) matchData[`match_${matchIdx}`].points = {};
  matchData[`match_${matchIdx}`].points[player] = val;
  input.classList.toggle('has-value', val > 0);
  input.classList.add('saving');
  updateMatchMeta();
  const tabs = document.querySelectorAll('.match-tab');
  const tabEl = tabs[matchIdx - 1];
  if (tabEl) tabEl.classList.toggle('has-data', matchHasData(matchIdx));
  const timerKey = `${matchIdx}_${player}`;
  clearTimeout(saveTimers[timerKey]);
  saveTimers[timerKey] = setTimeout(() => {
    set(ref(db, `matchData/match_${matchIdx}/points/${player}`), val)
      .then(() => { input.classList.remove('saving'); showToast(); })
      .catch(err => { console.error(err); input.classList.remove('saving'); });
  }, 300);
};

function showToast() {
  const t = document.getElementById('save-toast');
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
